  - id: fix/vfr-decode-alignment
    notes: "FIXED & GPU-validated (34ce9dd). Root cause was deeper: phase-1 itself was timestamp-based (NVDEC get_frames_at approximate). Fix: shared positional no-seek primitive video_io.iter_frames_at (sequential torchcodec._core.get_next_frame, pre-roll skip, positional select, end-clamp) used by BOTH GpuVideoSource and _decode_source_frames. Validated: 24 GPU frame-alignment tests (cross-backend identity on closed/open-GOP, VFR, trim), E2E VFR moving-square centroid err <4px (1-frame off would be >=50px), GPU api suite 14 passed. Perf: single-unit decode 2x faster; 4-unit parallel -28% (prefix re-decode, still above extraction speed). Risks: private torchcodec API (pinned 0.14.0, guarded by test); VFR runs made before this fix should be re-run; multi-unit prefix re-decode."
    title: "Frame alignment is NOT exact on VARIABLE-FRAME-RATE sources: seek_mode=approximate maps index->timestamp via AVERAGE fps, so phase-1 NVDEC feats and SAM CPU re-decode can resolve different frames per index on VFR (CPU-proven in tests/test_frame_alignment.py; CFR closed/open-GOP are fine). seek_mode=exact crashes on stream-copy-trimmed uploads so is not an option. Fix: single decode path (decode sampled frames once, reuse for feats+SAM) or guarantee identical backend+seek. First GPU-validate NVDEC-vs-CPU divergence on the VFR fixture per the spike's plan"
    status: "done"
    severity: "major"
    origin: "spike/frame-alignment-check"
