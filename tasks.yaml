  - id: perf/bench-giant-huge-compile
    notes: "MEASURED (GPU6 sm_120, 1024px, torch 2.12.1+cu130, 20 iters): dinov2-giant baseline 992.5ms/32.2fps/7177MB -> compile 910.3ms/35.2fps/5306MB (1.09x) -> fp8 716.2ms/44.7fps/3873MB (1.39x). dinov3-vith16plus baseline 1376.9ms/46.5fps/8007MB -> compile 1066.4ms/60.0fps/5851MB (1.29x) -> fp8 841.8ms/76.0fps/5407MB (1.63x). Controls: vitb16 compile 1.48x/fp8 1.65x; large compile 1.10x. Verdict: giant compile ~+9% (below the ~+15% estimate; GEMM-bound like dinov2-large), vith16plus compile +29% (2x the estimate). torchao FP8 (Float8DynamicActivationFloat8WeightConfig) is the real win (1.39-1.63x + big VRAM cut) but is SPEED-only measured — PCA-color fidelity gate (spike/fp8-attention Phase 0/1) required before serving. Raw log: scripts/bench_backbone.py output 2026-07-07."
    title: "Benchmark FP8/compile gains for dinov2-giant and dinov3-vith16plus (huge+ compile gain is only estimated ~+15%)"
