# Task registry. Read/mutate via the `jw task` CLI — do NOT edit this file whole
# (a PreToolUse hook redirects raw whole-file reads here). See docs/CONVENTIONS.md.
#
# Each task:
#   id      <type>/<kebab-slug>, type in feat|fix|perf|gate|spike|decision|docs|chore
#   title   required, an explanatory phrase an outsider can understand
#   status  pending | active | blocked | done | dropped
# Optional fields:
#   deps: [ids]                    blocking tasks (runnable only when all are done)
#   milestone: M1                  owning milestone (declared under milestones:)
#   round: YYYY-MM-DD-slug         the round that shipped/handled it
#   anchor: "DESIGN §5"            SSOT section it governs (unused here — SSOT disabled)
#   severity: blocker|major|minor  on review-finding tasks
#   origin: "..."                  where it came from (review, round, user, ...)
#   branch: feat/...               working branch
#   notes: "..."                   free text (e.g. an old codename, for traceability)
#   ruling: "..."                  the user's decision on a decision/... task
#   result: "..."                  a recorded measurement/outcome
#   lane: {branch, base_sha, depends_on}   parallel worktree lane (jw lanes verify)

