    round: 2026-07-07-review-fixes
    ruling: "하드코딩 threshold로 얇은 구조를 제거하는 것은 의도 아님. refit fg-token 선택을 hard avgpool>0.5 대신 fg-fraction soft weighting(weighted PCA)으로 교체해 얇은 팔/다리/도구를 비율대로 살림. SAM 마스크가 authoritative하므로 별도 user threshold slider 불필요. 프롬프트 정밀도는 feat/sam-autoseed-quality로 개선."
    title: "Is refit_and_render's adaptive_avg_pool2d(mask,grid)>0.5 (drops <50%-fg patches, excluding thin arms/tools/wheels from the color refit) intended, or should it use a lower threshold / soft weighting to cover thin structures?"
    status: done
    origin: "review-2026-07-07-sam2-foreground"
  - id: fix/refit-soft-weight-mask
    round: 2026-07-07-review-fixes
    title: "Replace refit's hard adaptive_avg_pool2d(mask,grid)>0.5 fg-token gate with fg-fraction SOFT WEIGHTING (weighted PCA over grid tokens) so thin structures survive the color refit; no hardcoded threshold, no user slider (per decision/refit-mask-grid-threshold ruling)"
    status: done
    severity: "major"
    origin: "review-2026-07-07-sam2-foreground"
  - id: fix/delete-mutation-stale-snapshot
    title: "run-mutation mutex (fix/run-mutation-mutex) still races on a stale snapshot: DELETE /api/runs, DELETE /api/sources and _persist_run supersede compute skip/protected under LOCK then rmtree OUTSIDE it, so a segment/refit registered into ACTIVE_RUN_MUTATIONS after the snapshot has its run dir deleted mid-mutation (feats/meta/source rmtree'd under it). Make victim selection + mutation-registration atomic under LOCK (DELETING_RUNS/SOURCES set, or atomic-rename victims to .trash/<uuid> under lock then delete outside), move the feats.f16 precheck inside the lock block, and add a barrier concurrency regression test"
    status: "done"
    severity: "major"
    origin: "review-2026-07-07-review-fixes"
  - id: fix/weighted-quantile-plotting-position
    title: "_weighted_quantile docstring claims it 'matches torch.quantile when weights are equal' but its midpoint plotting-position CDF (cw-0.5w)/cw_n = (i-0.5)/n differs from torch.quantile's type-7 linear i/(n-1) at small token counts (e.g. n=16,q=0.02 clamps to the min while torch interpolates xs[0..1]); refit display range is then more outlier-sensitive on small fg masks. Either make the weighted quantile reduce to torch.quantile at equal weights or correct the docstring's equivalence claim"
    status: "pending"
    severity: "minor"
    origin: "review-2026-07-07-review-fixes"
  - id: fix/upload-delete-source-phantom
    title: "Duplicate upload racing DELETE /api/sources can re-register a source whose dir was just rmtree'd: upload_source's (SOURCES_DIR/sid).exists() check + dir handling run OUTSIDE LOCK and only SOURCES[sid]=rec is locked, so an identical-bytes re-upload taking the else-branch can insert sid into SOURCES after delete_source popped it and rmtree'd the dir -> phantom source (list/workspace advertise it, create_runs 404s) until a restart re-scan. Pre-existing; surfaced by review-2026-07-07-review-fixes adversarial pass"
    status: "pending"
    severity: "minor"
    origin: "review-2026-07-07-review-fixes"
